services:
  prowatch:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env        # load_dotenv() reads this at startup
      - ./data:/app/data        # persist SQLite events database
      - ./config.yaml:/app/config.yaml  # allow config changes without rebuild
    devices:
      - /dev/video0:/dev/video0  # webcam passthrough — remove if using RTSP
    group_add:
      - video                    # grants container access to the video group
    restart: unless-stopped
